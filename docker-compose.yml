services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maddyblog
      POSTGRES_PASSWORD: maddyblog
      POSTGRES_DB: maddyblog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maddyblog"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    environment:
      DATABASE_URL: postgresql://maddyblog:maddyblog@postgres:5432/maddyblog
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy"
    profiles:
      - migrate

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://maddyblog:maddyblog@postgres:5432/maddyblog
      JWT_SECRET: change-this-in-production
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
